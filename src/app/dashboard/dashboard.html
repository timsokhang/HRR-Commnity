<div class="pair-hero">
  <div class="currency-pair">
    <div class="flag-container">
      <div class="flag eu">🇪🇺</div>
      <div class="flag us">🇺🇸</div>
    </div>
    <div class="pair-details">
      <h2>EUR/USD</h2>
      <p>Euro / US Dollar</p>
    </div>
  </div>
  <div class="hero-text">
    <h1>Lot Size Calculator</h1>
    <p>Precision risk management specifically for the Euro vs US Dollar market.</p>
  </div>
</div>

<div class="calculator-container">
  <div class="calc-card input-section">
    <h3>Trade Parameters</h3>
    
    <div class="form-group">
      <label>Entry Price</label>
      <input type="number" step="0.00001" placeholder="e.g. 1.10000" (input)="updateEntry($event)" />
    </div>

    <div class="form-group">
      <label>Stop Loss (SL) Price</label>
      <input type="number" step="0.00001" placeholder="e.g. 1.09500" (input)="updateSL($event)" />
    </div>



    <div class="form-group">
      <label>Risk Amount ($)</label>
      <input type="number" step="1" placeholder="e.g. 10" (input)="updateRisk($event)" />
    </div>
  </div>

  <div class="calc-card result-section">
    <h3>Calculation Results</h3>
    
    <div class="result-box primary">
      <span class="label">Recommended Lot Size</span>
      <span class="value lot-value">{{ lotSize() }} <small>Lots</small></span>
    </div>

    <div class="secondary-results">
      <div class="result-item">
        <span class="label">Stop Loss Pips</span>
        <span class="value">{{ slPips() }} Pips</span>
      </div>

    </div>
  </div>
</div>
